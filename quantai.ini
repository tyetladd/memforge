; [Run] keys are honored by the UEFI binary at boot.
; Anything else here is consumed by the post-test Python analyzer.
;
; DEFAULTS aim to actually test memory:
;   MultiPass=1 + Passes=0 covers every accessible byte of every
;   EfiConventionalMemory region (= 98%+ of physical RAM; the remaining
;   firmware-reserved 1-2% is unreachable to ANY UEFI application).
;
; For a quick smoke run instead of a thorough test, set:
;   Passes=1
;   MultiPass=0
; That tests only one 1 GB buffer (~50 s total) and is mostly useful
; for verifying the testing infrastructure itself.
[Run]
; 0 = auto: count derived from total addressable RAM / BufferMB
; >0 = hard cap on number of passes (each pass = 7 tests on one buffer)
Passes=0
; 1 = rotate the buffer through (region, offset) pairs covering EVERY
;     accessible byte of physical RAM. Total time scales with RAM size:
;     ~3 min per GB on modern HW.
; 0 = test only the first chunk (quick but covers ~6% on 16 GB systems).
MultiPass=1
; 0 = use all enabled CPU cores. >0 caps to this many.
MaxCores=0
; 0 = forbid AVX2 test even if CPU/firmware would allow.
; 1 = let detector decide (we now enable OSXSAVE ourselves, so AVX2
;     runs on virtually any modern x86 CPU).
EnableAVX=1
; Per-allocation buffer cap in MB. The UEFI binary AUTO-SCALES this on
; big-RAM systems if you leave it un-set / commented out:
;   ≤ 32 GB  → 1024 MB
;   ≤ 127 GB → 2048 MB
;   ≤ 511 GB → 4096 MB
;   ≥ 512 GB → 8192 MB
; Uncomment + set explicit value to override. Smaller = more passes,
; larger = fewer passes but each allocation could fail on small-RAM systems.
;BufferMB=1024
;
; Bit Fade test: how long to wait between write and verify (per phase × 2
; phases). The UEFI binary AUTO-SCALES this on DDR5 systems if you leave it
; un-set / commented out:
;   DDR4 default: 60  s/phase  = 2 min/pass total
;   DDR5 auto:    120 s/phase  = 4 min/pass total
;                 (DDR5 cells leak faster; on-die ECC masks short tests)
; Uncomment + set explicit value to override the auto-tune. Set 5 for
; very fast smoke runs, 300 for memtest86+ "overnight" thoroughness.
;BitFadeSeconds=60
;
; Bit Fade: run on every multipass pass, or only on pass 1?
;   0 = only on pass 1 (default, ~30-60 min faster full test on big RAM)
;   1 = run every pass (memtest86+ behaviour; adds hours on multi-GB RAM)
; Retention failures show up the same way on every chunk, so testing one
; chunk in depth is diagnostically equivalent to testing every chunk —
; that's why default is 0.
;BitFadeEveryPass=0
;
; Per-DIMM isolation: test ONLY the physical memory range of DIMM #N
; (1-based, matches what main-menu HW panel shows). Lets you check each
; stick separately without removing the others. Set 0 (or leave commented
; out) to test all DIMMs together as normal.
;   1 = test only DIMM1
;   2 = test only DIMM2 ... etc.
; NOTE: this auto-forces MultiPass=0, Passes=1 so the buffer stays
; inside the target DIMM's range. Works perfectly on block-mapped BIOSes
; (most modern consumer desktops and servers — each DIMM has its own
; non-overlapping address range). On boards with true cache-line
; interleave (rare, mostly some server / Xeon-W configs) isolation is
; "per channel slot" rather than per individual stick — the iMC keeps
; alternating cache lines between channels regardless.
; Since v0.4.25, when the post-test verdict finds errors spread across
; multiple DIMMs, the program runs this isolation AUTOMATICALLY (no need
; to set TestOnlyDimm by hand) and produces a definitive REPLACE answer.
; Setting TestOnlyDimm here is only needed for forced single-DIMM debug.
;TestOnlyDimm=0
;
; Marathon mode: keep cycling the full test for N hours (1..24) instead of
; stopping after the auto/manual pass count. Catches intermittent failures
; that only surface after 2-4 h of sustained thermal load — the kind of
; bug pattern tests miss in a 30-min run but a customer hits "randomly"
; once a week. When enabled, the multipass iterator wraps when RAM coverage
; cycle completes, so every cycle is fresh (region, offset) pairs.
; 0 (or commented out) = disabled (normal pass-count behaviour).
; 8 = run for 8 hours total.
; Recommended: 4 for shop intake, 8-12 for "leave it overnight" diagnosis,
; 24 for the most-stubborn intermittent failures.
;MarathonHours=0
;
; Hardware reboot watchdog (seconds). If a CPU core wedges INSIDE a test — e.g.
; a bad-RAM access that locks the core hard rather than just returning wrong
; data — the program can't rescue itself from its own frozen core. With this
; set, the firmware reboots the machine that many seconds after progress stops,
; instead of hanging until you press reset. The log (written line-by-line) still
; shows the last point reached. The program re-arms the timer ~10x/sec while a
; test runs, so it only fires on a genuine freeze, and it is armed ONLY during
; tests — never at the menu or the results screen.
;   0   = disabled (a wedged core freezes the box, old behaviour)
;   120 = default: reboot ~2 min after a freeze. Range 1..600.
;WatchdogSeconds=120

; Used by the UEFI binary for the menu language. Also used by the analyzer.
[Meta]
Version=0.4.46
Debug=0
Language=en

; Display tuning. Auto-detection handles most setups; uncomment a key
; if your particular firmware/monitor combo needs an override.
[Display]
;
; EnableAA: smooth anti-aliased text via direct framebuffer writes.
; OFF by default — uses GOP Blt for 1-bit text rendering which works
; reliably on EVERY UEFI firmware. AA looks nicer but breaks on some
; older Intel iGPU firmware (Dell OptiPlex etc.) where direct-fb writes
; land at wrong screen positions. Try enabling on modern desktops; if
; text looks glitched, turn back off.
;   0 = safe Blt 1-bit (default, jagged but bulletproof)
;   1 = smooth AA via direct framebuffer (faster, prettier, less compatible)
;EnableAA=0
;
; ForceBlt: legacy override — keeps Blt path even if EnableAA=1.
;ForceBlt=0
;
; Width / Height: pin to a specific GOP mode. The picker normally takes
; the LARGEST mode firmware offers (which fills the screen on most
; monitors). Override only if firmware enumerates a buggy mode that gets
; auto-picked. Both Width AND Height must be set to take effect.
;Width=1920
;Height=1080
;
; FontScale: 1 = native 14×28 px bitmap, 2 = 28×56 px (each pixel doubled).
; AUTO behaviour: 2× on screens taller than 1500 px (4K/QHD panels),
; 1× otherwise. Set explicitly to override:
;   1 = always small text (more content per screen on 4K)
;   2 = always large text (readable on low-DPI big screens)
;FontScale=0

; The analyzer side. Network access is the analyzer's concern only —
; the UEFI binary itself makes zero network calls.
[AI]
ApiKey=
Model=gemini-2.5-pro
TimeoutSec=60
MaxRetries=2
